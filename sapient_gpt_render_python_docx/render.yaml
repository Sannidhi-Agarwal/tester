services:
  - type: web
    name: sapient-minutes-gpt-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_MODEL
        value: saaras:v3
      - key: USE_BATCH_BY_DEFAULT
        value: false
